<svg width="300" height="300" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="redGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff3b3b"/>
      <stop offset="100%" stop-color="#5a0000"/>
    </radialGradient>

    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#0b0000"/>

  <!-- Glowing Circle -->
  <circle cx="150" cy="150" r="80" fill="url(#redGlow)" filter="url(#softGlow)"/>

  <!-- Cross Lines -->
  <line x1="0" y1="150" x2="300" y2="150" stroke="#ff1a1a" stroke-width="3" opacity="0.6"/>
  <line x1="150" y1="0" x2="150" y2="300" stroke="#ff1a1a" stroke-width="3" opacity="0.6"/>

  <!-- Rotated Square -->
  <rect x="110" y="110" width="80" height="80"
        fill="none"
        stroke="#ff4d4d"
        stroke-width="4"
        transform="rotate(45 150 150)"/>

  <!-- Title -->
  <text x="150" y="285" text-anchor="middle" fill="#ff6666" font-size="16" font-family="Arial">
    RED THING
  </text>
</svg>
